<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Dashboard</h3>
        <div>
          <a href="{{ url_for('employees') }}" class="btn btn-sm btn-primary">Manage Employees</a>
          <a href="{{ url_for('attendance') }}" class="btn btn-sm btn-secondary">Attendance</a>
          <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger">Logout</a>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title">Welcome, {{ username }}</h5>
          <p class="card-text">Total employees: {{ total_employees }}</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Recent Attendance</div>
        <div class="card-body p-0">
          <table class="table table-striped m-0">
            <thead>
              <tr>
                <th>Employee</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {% for row in recent_attendance %}
              <tr>

                <td>{{ row.name }}</td>
                <td>{{ row.attendance_date }}</td>
                <td>{{ row.status }}</td>
                
              </tr>
              {% else %}
              <tr>
                <td colspan="3" class="text-center">No attendance records yet.</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
