<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ action }} Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="mb-3">
        <a href="{{ url_for('employees') }}" class="btn btn-secondary">Back to list</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category,message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" value="{{ employee.name or '' }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Position</label>
          <input type="text" name="position" class="form-control" value="{{ employee.position or '' }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select name="status" class="form-select" required>
            <option value="active" {% if employee.status == 'active' %}selected{% endif %}>Active</option>
            <option value="inactive" {% if employee.status == 'inactive' %}selected{% endif %}>Inactive</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">{{ action }}</button>
      </form>
    </div>
  </body>
</html>
